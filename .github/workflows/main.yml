# .github/workflows/main.yml

# 워크플로우 이름
name: Snapsplit CI/CD

# 언제 실행할지 결정 (main 브랜치에 push 될 때)
on:
  push:
    branches: [ "main" ]

# 실행할 작업들
jobs:
  # 1. 빌드 작업: 코드를 도커 이미지로 만드는 단계
  build:
    runs-on: ubuntu-latest
    steps:
      # 내 코드를 가져옴
      - name: Checkout
        uses: actions/checkout@v3

      # Docker Hub에 로그인 (GitHub Secret에 저장된 값 사용)
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 도커 이미지를 빌드하고 Docker Hub에 올림
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/snapsplit:latest

  # 2. 배포 작업: 완성된 이미지를 EC2 서버에서 실행하는 단계
  deploy:
    needs: build # 빌드 작업이 끝나야 실행
    runs-on: ubuntu-latest
    steps:
      # EC2 서버에 SSH로 접속 (GitHub Secret에 저장된 값 사용)
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          script:
            # --- 이 아래부터는 EC2 서버에서 실행될 명령어들 ---
            # 1. Docker Hub에서 최신 이미지를 내려받음
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/snapsplit:latest

            # 2. 기존에 실행되던 컨테이너가 있으면 멈추고 삭제 (오류나도 무시)
            sudo docker stop snapsplit-container || true
            sudo docker rm snapsplit-container || true

            # 3. 최신 이미지로 새 컨테이너를 실행
            sudo docker run -d -p 80:8080 --name snapsplit-container ${{ secrets.DOCKER_USERNAME }}/snapsplit:latest