# .github/workflows/main.yml

# 워크플로우 이름
name: Snapsplit CI/CD

# 언제 실행할지 결정 (develop 브랜치에 push 될 때)
on:
  push:
    branches: [ "develop" ]

# 실행할 작업들
jobs:
  # 1. 빌드 작업: 코드를 도커 이미지로 만드는 단계
  build:
    runs-on: ubuntu-latest
    steps:
      # 내 코드를 가져옴
      - name: Checkout
        uses: actions/checkout@v3

      # Docker Hub에 로그인 (GitHub Secret에 저장된 값 사용)
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 도커 이미지를 빌드하고 Docker Hub에 올림
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/snapsplit:latest

  # 2. 배포 작업: 완성된 이미지를 EC2 서버에서 실행하는 단계
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          script: |
            # 1. 배포용 application.yml 파일을 EC2 서버에 생성합니다.
            echo "${{ secrets.APPLICATION_YML_PROD }}" > /home/ubuntu/application.yml

            # 2. GCP 인증 키 파일도 생성합니다.
            echo "${{ secrets.GCP_SA_KEY }}" > /home/ubuntu/gcp-key.json
            
            # 3. Docker Hub에서 최신 이미지를 받아옵니다.
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/snapsplit:latest
            
            # 4. 기존 컨테이너를 중지 및 삭제합니다.
            sudo docker stop snapsplit-container || true
            sudo docker rm snapsplit-container || true
            
            # 5. yml 파일과 json 파일을 컨테이너에 마운트하여 실행합니다.
            sudo docker run -d -p 80:8080 \
              --name snapsplit-container \
              -v /home/ubuntu/application.yml:/app/application.yml \
              -v /home/ubuntu/gcp-key.json:/app/config/gcp-key.json \
              ${{ secrets.DOCKER_USERNAME }}/snapsplit:latest