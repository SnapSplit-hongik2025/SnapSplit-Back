# .github/workflows/main.yml

# 워크플로우 이름
name: Snapsplit CI/CD

# 언제 실행할지 결정 (develop 브랜치에 push 될 때)
on:
  push:
    branches: [ "develop" ]

# 실행할 작업들
jobs:
  # 1. 빌드 작업: 코드를 도커 이미지로 만드는 단계
  build:
    runs-on: ubuntu-latest
    steps:
      # 내 코드를 가져옴
      - name: Checkout
        uses: actions/checkout@v3

      # Docker Hub에 로그인 (GitHub Secret에 저장된 값 사용)
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 도커 이미지를 빌드하고 Docker Hub에 올림
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/snapsplit:latest

  # 2. 배포 작업: 완성된 이미지를 EC2 서버에서 실행하는 단계
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}   # Ubuntu면 ubuntu
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          port: 22
          script_stop: true
          debug: true
          script: |
            set -euxo pipefail

            # 1) Docker ensure
            if ! command -v docker >/dev/null 2>&1; then
              sudo apt-get update && sudo apt-get install -y docker.io
              sudo systemctl enable --now docker
            fi
            sudo docker version

            # 2) (프라이빗 레포일 때만) 로그인
            echo "${{ secrets.DOCKER_PASSWORD }}" | sudo docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin || true

            # 3) Pull & run
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/snapsplit:latest

            sudo docker stop snapsplit-container || true
            sudo docker rm snapsplit-container || true

            # 포트 점유 확인(디버그용)
            (sudo lsof -i:80 || true) && (sudo ss -ltnp | grep :80 || true)

            sudo docker run -d \
              --name snapsplit-container \
              --restart unless-stopped \
              -p 80:8080 \
              ${{ secrets.DOCKER_USERNAME }}/snapsplit:latest

            # (옵션) 이미지 정리
            sudo docker image prune -f || true
